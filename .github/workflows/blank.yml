# This is a basic workflow to help you get started with Actions
name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Run a one-line script
        run: mvn install

      - name: Run a multi-line script
        run: |
          echo Add other actions to build,
          echo test, and deploy your project.

      - name: Clean destination directory from my folder
        run: Remove-Item -Force C:\Test\vino\*.jar

      - name: Move JAR file to runner directory
        run: Move-Item -Force target\*.jar C:\Test\vino\

      - name: Verify JAR in destination
        run: Get-ChildItem C:\Test\vino\

